<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xwing Project Indonesia</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    color: #000;

    /* BACKGROUND GAMBAR */
    background: url('background.jpg') no-repeat center center fixed;
    background-size: cover;
}

/* overlay biar teks kebaca */
.overlay {
    background: rgba(255,255,255,0.9);
    min-height: 100vh;
}

header {
    text-align: center;
    padding: 30px;
}

h1 {
    margin: 0;
}

.container {
    padding: 20px;
}

.product {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
}

.product img {
    width: 100%;
    max-width: 200px;
    border-radius: 10px;
    margin-bottom: 15px;
}

.price {
    color: #c9a100;
    font-size: 18px;
    margin-bottom: 10px;
}

.btn {
    display: inline-block;
    padding: 10px 20px;
    background: #c9a100;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="overlay">

<header>
    <h1>Xwing Project Indonesia</h1>
    <p>Jam Tangan Brick Lego - Elegant & Classy</p>
</header>

<div class="container">

    <div class="product">
        <img src="analog.jpg" alt="Jam Analog">
        <h2>Jam Tangan Lego Analog</h2>
        <div class="price">Rp150.000</div>
        <a class="btn" href="https://wa.me/6285173139125?text=Pesan%20Jam%20Analog">Beli</a>
    </div>

    <div class="product">
        <img src="digital.jpg" alt="Jam Digital">
        <h2>Jam Tangan Lego Digital</h2>
        <div class="price">Rp150.000</div>
        <a class="btn" href="https://wa.me/6285173139125?text=Pesan%20Jam%20Digital">Beli</a>
    </div>

    <div class="product">
        <img src="swatch.jpg" alt="Jam Swatch">
        <h2>Jam Tangan Lego Swatch</h2>
        <div class="price">Rp150.000</div>
        <a class="btn" href="https://wa.me/6285173139125?text=Pesan%20Jam%20Swatch">Beli</a>
    </div>

</div>

</div>

</body>
</html>
